    <title>Chicken Adobo/title>
</head>
<body>
    <p> This is filipino dish. This is a <em>Chicken adobo </em> 
        chicken adobo cooked with soy sauce and vinger and condiments.  </p>

    <img src="https://salu-salo.com/wp-content/uploads/2015/04/Pork-Adobo-3.jpg.webp" alt="This is Adobo">

    <h4>Ingredients</h4>
    <ul>
        <li>Chicken</li>
        <li>Soy sauce</li>
        <li>Vinegar</li>
        <li>Black Pepper</li>
        <li>Onion</li>
        <li>Garlic</li>
        <li>Bay leaf</li>
    </ul>

    <h4>Procedure</h4>
    <ol>
        <li>Heat oil in pan and sauté garlic and onions. Then add chicken to the 
        pan and sear on all sides, until you have a little browning in the chicken skin.
            </li>
        <li>Pour in vinegar, soy sauce and water. Add bay leaves, pepper and Knorr Chicken Cubes. 
            Bring to a boil over high heat then reduce heat to simmer, but do not cover the pan. 
            Continue to simmer for 10 mins.
            </li>
        <li>Remove chicken pieces from sauce and fry in another pan until nicely browned.
            </li>
        <li>Put back fried chicken pieces into sauce. Add sugar and let simmer again for another 
            10 minutes or until sauce has thickened. Serve warm.
            </li>
    </ol>

</body>
